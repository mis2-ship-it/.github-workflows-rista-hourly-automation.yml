name: Fetch Inventory

on:
  workflow_dispatch:   # Allows you to click a button and run it manually anytime

jobs:
  run-sync:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Execute Sync Script
      env:
        RISTA_BASE_URL: 'https://api.rista.com/v1' # Swap out if they use a different URL
        RISTA_AUTH_TOKEN: ${{ secrets.RISTA_AUTH_TOKEN }}
        GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
      run: python inventory.py
